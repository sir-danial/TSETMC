<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>اعتبار ناکافی</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @font-face{font-family:"Vazir";src:url("/static/core/fonts/vazir/Vazir.woff2") format("woff2");font-weight:400;font-display:swap;}
    @font-face{font-family:"Vazir";src:url("/static/core/fonts/vazir/Vazir-Bold.woff2") format("woff2");font-weight:700;font-display:swap;}
    :root{--bg:#0b1120;--card:#0d1526;--text:#e2e8f0;--muted:#64748b;--blue:#3b82f6;--yellow:#f59e0b;--glass:rgba(15,23,42,.72);--glass-border:rgba(148,163,184,.12);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Vazir",Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 900px 500px at 70% -5%,rgba(59,130,246,.15),transparent 70%),radial-gradient(ellipse 600px 400px at 15% 5%,rgba(16,185,129,.10),transparent 60%);pointer-events:none;z-index:0;}
    .navbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(1.5);background:var(--glass);border-bottom:1px solid var(--glass-border);padding:0 28px;}
    .navbar-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
    .nav-brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700;color:#f1f5f9;text-decoration:none;}
    .nav-brand .logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;}
    .nav-links{display:flex;align-items:center;gap:6px;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:13px;padding:8px 14px;border-radius:10px;transition:all .2s;}
    .nav-links a:hover,.nav-links a.active{color:#e2e8f0;background:rgba(255,255,255,.06);}
    .center-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:40px 20px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .card{animation:fadeUp .5s ease both;background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,0) 100%),var(--card);border:1px solid var(--glass-border);border-radius:16px;padding:36px;box-shadow:0 4px 24px rgba(0,0,0,.25);max-width:460px;width:100%;text-align:center;}
    .icon{font-size:48px;margin-bottom:16px;}
    .card h2{font-size:20px;margin-bottom:10px;color:#f1f5f9;}
    .card p{color:var(--muted);font-size:14px;line-height:2;margin-bottom:22px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:12px;border:1px solid rgba(59,130,246,.3);background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.10));color:#bfdbfe;cursor:pointer;text-decoration:none;font-weight:700;font-size:14px;font-family:"Vazir",Tahoma,sans-serif;transition:all .2s ease;}
    .btn:hover{background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(139,92,246,.18));border-color:rgba(59,130,246,.5);box-shadow:0 0 20px rgba(59,130,246,.15);}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a class="nav-brand" href="/"><span class="logo">B</span> داشبورد بازار</a>
    <div class="nav-links">
      <a href="/">داشبورد</a>
      <a href="/symbol/">تحلیل نماد</a>
      <a href="/accounts/profile/">{{ request.user.username }}</a>
    </div>
  </div>
</nav>
<div class="center-wrap">
  <div class="card">
    <div class="icon">&#9888;&#65039;</div>
    <h2>اعتبار شما به پایان رسیده</h2>
    <p>برای استفاده از بخش تحلیل نماد به اعتبار روزانه نیاز دارید.<br/>لطفاً با مدیر سایت تماس بگیرید تا اعتبار جدید به حسابتان اضافه شود.</p>
    <a class="btn" href="/accounts/profile/">مشاهده حساب کاربری</a>
  </div>
</div>
</body>
</html>
